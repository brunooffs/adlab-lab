_format_version: "3.0"
_transform: true

services:
  - name: adlab-api
    url: http://api:3000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    routes:
      - name: api-v1
        paths:
          - /v1
        strip_path: false
        methods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
      - name: api-health
        paths:
          - /health
        strip_path: false
        methods:
          - GET
      - name: api-docs
        paths:
          - /docs
          - /graphql
          - /graphiql
        strip_path: false
        methods:
          - GET
          - POST
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
          fault_tolerant: true
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type

plugins:
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
